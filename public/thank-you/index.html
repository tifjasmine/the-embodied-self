<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thank You | The Embodied Self</title>
    <meta
      name="description"
      content="Thank you for reaching out to The Embodied Self."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cream: #f6efe6;
        --linen: #fbf7f0;
        --charcoal: #1b1510;
        --clay: #bd7558;
        --muted: #645a52;
        --line: rgba(39, 35, 29, 0.13);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 0;
        background: var(--cream);
        color: var(--charcoal);
        font-family: "Jost", sans-serif;
        font-weight: 300;
      }

      .thankYouCard {
        width: min(920px, 100%);
        margin: 84px auto;
        border: 1px solid var(--line);
        background: rgba(251, 247, 240, 0.78);
        box-shadow: 0 22px 80px rgba(39, 35, 29, 0.07);
        padding: clamp(38px, 7vw, 76px);
      }

      .eyebrow {
        margin: 0 0 26px;
        color: var(--clay);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 24px;
        max-width: 720px;
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(48px, 7vw, 82px);
        font-weight: 300;
        line-height: 0.98;
        letter-spacing: 0;
      }

      h1 em {
        color: var(--clay);
        font-style: italic;
      }

      p {
        margin: 0;
        max-width: 680px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.85;
      }

      .actions {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-top: 38px;
      }

      a {
        min-height: 56px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 16px 28px;
        color: inherit;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-decoration: none;
        text-transform: uppercase;
      }

      .primary {
        background: var(--charcoal);
        color: var(--linen);
      }

      .secondary {
        border: 1px solid var(--line);
      }

      @media (max-width: 560px) {
        }

        .actions,
        a {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="thankYouCard">
      <p class="eyebrow">Message received</p>
      <h1>Thank you for reaching <em>out.</em></h1>
      <p>
        Your message has been received. I’ll read it with care and respond as soon as I’m able.
        If this is urgent or you are in crisis, please call 988 or go to your nearest emergency room.
      </p>
      <div class="actions">
        <a class="primary" href="/">Return Home</a>
      </div>
    </main>
  </body>
</html>
